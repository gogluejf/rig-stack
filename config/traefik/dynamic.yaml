# Traefik dynamic configuration
# rig-stack route definitions and middleware
# This file is hot-reloaded — no restart needed after changes.

tls:
  stores:
    default:
      defaultCertificate:
        # Generated by scripts/setup/06-setup-tls.sh (mkcert, locally trusted).
        # To use your own certificate (Let's Encrypt, commercial CA, etc.):
        # replace local.crt and local.key in config/traefik/certs/ and restart Traefik.
        certFile: /etc/traefik/certs/local.crt
        keyFile:  /etc/traefik/certs/local.key

http:
  middlewares:
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 86400

    rate-limit:
      rateLimit:
        average: 200
        burst: 50

    rag-strip:
      stripPrefix:
        prefixes:
          - /rag

    ollama-strip:
      stripPrefix:
        prefixes:
          - /ollama

    comfyui-strip:
      stripPrefix:
        prefixes:
          - /comfy

    langfuse-strip:
      stripPrefix:
        prefixes:
          - /langfuse

  routers:
    vllm:
      rule: "PathPrefix(`/v1`) || PathPrefix(`/openai`)"
      service: vllm
      entryPoints:
        - web
        - websecure

    rag:
      rule: "PathPrefix(`/rag`)"
      middlewares:
        - rag-strip
      service: rag
      entryPoints:
        - web
        - websecure

    ollama:
      rule: "PathPrefix(`/ollama`)"
      middlewares:
        - ollama-strip
      service: ollama
      entryPoints:
        - web
        - websecure

    comfyui:
      rule: "PathPrefix(`/comfy`)"
      middlewares:
        - comfyui-strip
      service: comfyui
      entryPoints:
        - web
        - websecure

    langfuse:
      rule: "PathPrefix(`/langfuse`)"
      middlewares:
        - langfuse-strip
      service: langfuse
      entryPoints:
        - web
        - websecure

  services:
    vllm:
      loadBalancer:
        healthCheck:
          path: /health
          interval: "10s"
          timeout: "3s"
        servers:
          - url: "http://rig-vllm-stable:8000"
          - url: "http://rig-vllm-edge:8000"

    rag:
      loadBalancer:
        servers:
          - url: "http://rig-rag-api:8001"

    ollama:
      loadBalancer:
        servers:
          - url: "http://rig-ollama:11434"

    comfyui:
      loadBalancer:
        healthCheck:
          path: /comfyui/health
          interval: "10s"
          timeout: "3s"
        servers:
          - url: "http://rig-comfyui-stable:8188"
          - url: "http://rig-comfyui-edge:8188"
          - url: "http://rig-comfyui-cpu:8188"

    langfuse:
      loadBalancer:
        servers:
          - url: "http://rig-langfuse:3000"

