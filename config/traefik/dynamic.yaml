# Traefik dynamic configuration
# rig-stack route definitions and middleware
# This file is hot-reloaded — no restart needed after changes.

http:
  middlewares:
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 86400

    rate-limit:
      rateLimit:
        average: 200
        burst: 50

    rag-strip:
      stripPrefix:
        prefixes:
          - /rag

    ollama-strip:
      stripPrefix:
        prefixes:
          - /ollama

    comfyui-strip:
      stripPrefix:
        prefixes:
          - /comfy

    langfuse-strip:
      stripPrefix:
        prefixes:
          - /langfuse

  routers:
    vllm:
      rule: "PathPrefix(`/v1`) || PathPrefix(`/openai`)"
      service: vllm
      entryPoints:
        - web

    rag:
      rule: "PathPrefix(`/rag`)"
      middlewares:
        - rag-strip
      service: rag
      entryPoints:
        - web

    ollama:
      rule: "PathPrefix(`/ollama`)"
      middlewares:
        - ollama-strip
      service: ollama
      entryPoints:
        - web

    comfyui:
      rule: "PathPrefix(`/comfy`)"
      middlewares:
        - comfyui-strip
      service: comfyui
      entryPoints:
        - web

    langfuse:
      rule: "PathPrefix(`/langfuse`)"
      middlewares:
        - langfuse-strip
      service: langfuse
      entryPoints:
        - web

  services:
    vllm:
      loadBalancer:
        servers:
          - url: "http://rig-vllm-stable:8000"
          - url: "http://rig-vllm-edge:8000"

    rag:
      loadBalancer:
        servers:
          - url: "http://rig-rag-api:8001"

    ollama:
      loadBalancer:
        servers:
          - url: "http://rig-ollama:11434"

    comfyui:
      loadBalancer:
        servers:
          - url: "http://rig-comfyui-stable:8188"
          - url: "http://rig-comfyui-edge:8188"
          - url: "http://rig-comfyui-cpu:8188"

    langfuse:
      loadBalancer:
        servers:
          - url: "http://rig-langfuse:3000"
